#---------------------------------------------------------------------
# Global settings
#---------------------------------------------------------------------
global
    log stdout format raw local0
    maxconn 4096
    daemon

    # TLS tuning
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
    ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets

#---------------------------------------------------------------------
# Defaults
#---------------------------------------------------------------------
defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5s
    timeout client  30s
    timeout server  30s
    errorfile 400 /etc/haproxy/errors/400.http
    errorfile 403 /etc/haproxy/errors/403.http
    errorfile 408 /etc/haproxy/errors/408.http
    errorfile 500 /etc/haproxy/errors/500.http
    errorfile 502 /etc/haproxy/errors/502.http
    errorfile 503 /etc/haproxy/errors/503.http
    errorfile 504 /etc/haproxy/errors/504.http

#---------------------------------------------------------------------
# Frontend: ACME challenge (Let's Encrypt HTTP-01 validation)
# Bound to port 80, handles only /.well-known/acme-challenge/ paths
#---------------------------------------------------------------------
frontend acme_challenge
    bind *:80
    mode http

    # Route Let's Encrypt challenges to the certbot container
    acl is_acme_challenge path_beg /.well-known/acme-challenge/
    use_backend certbot if is_acme_challenge

    # Redirect all other HTTP traffic to HTTPS
    redirect scheme https code 301 if !{ ssl_fc }

#---------------------------------------------------------------------
# Frontend: HTTPS (TLS termination + API key auth)
#---------------------------------------------------------------------
frontend https_in
    bind *:443 ssl crt /etc/ssl/certs/caas.pem alpn h2,http/1.1
    mode http

    # Security headers
    http-response set-header Strict-Transport-Security "max-age=31536000; includeSubDomains"
    http-response set-header X-Content-Type-Options nosniff
    http-response set-header X-Frame-Options DENY

    # ----- API Key Authentication -----
    # Expected header: X-API-Key
    # Value is compared against the environment variable CAAS_API_KEY
    # If the header is missing or invalid → 401 Unauthorized
    acl valid_api_key req.hdr(X-API-Key) -m found
    acl correct_api_key req.hdr(X-API-Key) -m str ${CAAS_API_KEY}

    # Return 401 if API key is missing or incorrect
    http-request deny deny_status 401 if !valid_api_key || !correct_api_key

    # Strip the API key header before forwarding to the backend
    # The CAAS application never sees the secret
    http-request del-header X-API-Key

    # Forward to CAAS backend
    default_backend caas_backend

#---------------------------------------------------------------------
# Backend: CAAS application
#---------------------------------------------------------------------
backend caas_backend
    mode http
    balance roundrobin

    # Health check against CAAS root endpoint
    option httpchk GET /
    http-check expect status 200

    server caas caas:8000 check inter 10s fall 3 rise 2

#---------------------------------------------------------------------
# Backend: Certbot (for Let's Encrypt HTTP-01 challenge)
#---------------------------------------------------------------------
backend certbot
    mode http
    server certbot certbot:80 check
