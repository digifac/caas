worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # -------------------------------------------------------
    # Logging
    # -------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # -------------------------------------------------------
    # Upstreams
    # -------------------------------------------------------
    upstream authelia {
        server authelia:9091;
    }

    upstream caas {
        server caas:8000;
    }

    # -------------------------------------------------------
    # Map: Authelia check result
    # -------------------------------------------------------
    map $upstream_http_authelia_protected $authelia_bypass {
        default 0;
        "true" 1;
    }

    # -------------------------------------------------------
    # Server: HTTP → redirect to HTTPS + ACME challenge
    # -------------------------------------------------------
    server {
        listen 80;
        server_name ${DOMAIN};

        # Let's Encrypt ACME challenge (HTTP-01)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -------------------------------------------------------
    # Server: HTTPS — TLS termination + Authelia protection
    # -------------------------------------------------------
    server {
        listen 443 ssl http2;
        server_name ${DOMAIN};

        # ----- TLS certificates -----
        ssl_certificate /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;

        # ----- TLS tuning -----
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # ----- Security headers -----
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;

        # ---------------------------------------------------
        # Authelia — protected routes (default: all routes)
        # ---------------------------------------------------
        # These routes require authentication via Authelia
        location / {
            # Authelia verification
            auth_request /authelia-check;

            # On successful auth, proxy to CAAS
            proxy_pass http://caas;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Forward Authelia user info to CAAS (optional)
            proxy_set_header X-Authelia-User $upstream_http_x_authelia_user;
            proxy_set_header X-Authelia-Email $upstream_http_x_authelia_email;
            proxy_set_header X-Authelia-Groups $upstream_http_x_authelia_groups;

            # Timeouts
            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # ---------------------------------------------------
        # Authelia — sub-request for verification
        # ---------------------------------------------------
        location = /authelia-check {
            internal;

            proxy_pass http://authelia/api/verify?rd=https://$host/;
            proxy_set_header X-Original-URL $scheme://$host$request_uri;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Pass relevant headers to Authelia
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Authelia response headers we want to capture
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";

            # Forward Authelia's set-cookie so session is established
            auth_request_set $user $upstream_http_x_authelia_user;
            auth_request_set $email $upstream_http_x_authelia_email;
            auth_request_set $groups $upstream_http_x_authelia_groups;
        }

        # ---------------------------------------------------
        # Authelia — web interface (login, 2FA, etc.)
        # ---------------------------------------------------
        # These routes serve the Authelia frontend directly
        location /authelia/ {
            proxy_pass http://authelia/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support (needed for some Authelia features)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
