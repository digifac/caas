worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # -------------------------------------------------------
    # Logging
    # -------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # -------------------------------------------------------
    # Map: extract API key for comparison
    # -------------------------------------------------------
    map $http_x_api_key $api_key_valid {
        default 0;
        "${CAAS_API_KEY}" 1;
    }

    # -------------------------------------------------------
    # Server: HTTP → redirect to HTTPS + ACME challenge
    # -------------------------------------------------------
    server {
        listen 80;
        server_name ${DOMAIN};

        # Let's Encrypt ACME challenge (HTTP-01)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -------------------------------------------------------
    # Server: HTTPS — TLS termination + API key auth
    # -------------------------------------------------------
    server {
        listen 443 ssl http2;
        server_name ${DOMAIN};

        # ----- TLS certificates -----
        ssl_certificate /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;

        # ----- TLS tuning -----
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # ----- Security headers -----
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;

        # ----- API Key Authentication -----
        # If the API key is missing or invalid → 401 Unauthorized
        if ($api_key_valid = 0) {
            return 401;
        }

        # ----- Proxy to CAAS -----
        location / {
            # Strip the API key header before forwarding
            proxy_set_header X-API-Key "";

            proxy_pass http://caas:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }
    }
}
